<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboards</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 640px;
    margin: 40px auto;
    padding: 0 20px;
    background: #f6f7f9;
    color: #1a1a2e;
  }
  h1 { font-size: 1.5rem; }
  #lista { list-style: none; padding: 0; }
  #lista li {
    background: #fff;
    border: 1px solid #e2e4e8;
    border-radius: 10px;
    margin-bottom: 10px;
    transition: box-shadow .15s;
  }
  #lista li:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  #lista a {
    display: block;
    padding: 14px 18px;
    text-decoration: none;
    color: inherit;
    word-break: break-word;
  }
  .nombre { color: #1a56db; font-weight: 500; }
  .fecha { display: block; font-size: .85rem; color: #888; margin-top: 4px; }
  .estado { color: #888; }
  @media (prefers-color-scheme: dark) {
    body { background: #15161a; color: #e6e6e6; }
    #lista li { background: #1f2126; border-color: #33363d; }
    .nombre { color: #7aa7ff; }
  }
</style>
</head>
<body>
<h1>📊 Dashboards</h1>
<p class="estado" id="estado">Cargando…</p>
<ul id="lista"></ul>

<script>
const USUARIO = "nflizarraga";
const REPO = "dashboards";
const BRANCH = "main";
const API = `https://api.github.com/repos/${USUARIO}/${REPO}`;

async function cargar() {
  const archivos = await fetch(`${API}/contents/?ref=${BRANCH}`).then(r => r.json());

  const htmls = archivos.filter(f =>
    f.type === "file" &&
    /\.html?$/i.test(f.name) &&
    f.name.toLowerCase() !== "index.html"
  );

  // buscar la fecha del último commit de cada archivo
  const conFecha = await Promise.all(htmls.map(async f => {
    try {
      const commits = await fetch(
        `${API}/commits?path=${encodeURIComponent(f.path)}&sha=${BRANCH}&per_page=1`
      ).then(r => r.json());
      f.fecha = new Date(commits[0].commit.committer.date);
    } catch (e) {
      f.fecha = null;
    }
    return f;
  }));

  // más recientes arriba
  conFecha.sort((a, b) => (b.fecha || 0) - (a.fecha || 0));

  const lista = document.getElementById("lista");
  conFecha.forEach(f => {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.href = f.name; // link relativo: funciona en GitHub Pages

    const nombre = document.createElement("span");
    nombre.className = "nombre";
    nombre.textContent = f.name.replace(/\.html?$/i, "").replace(/[_-]/g, " ");

    const fecha = document.createElement("span");
    fecha.className = "fecha";
    fecha.textContent = f.fecha
      ? "Subido el " + f.fecha.toLocaleDateString("es-AR", { day: "numeric", month: "long", year: "numeric" })
      : "";

    a.appendChild(nombre);
    a.appendChild(fecha);
    li.appendChild(a);
    lista.appendChild(li);
  });

  document.getElementById("estado").textContent =
    conFecha.length ? `${conFecha.length} página${conFecha.length > 1 ? "s" : ""}` : "No hay páginas todavía.";
}

cargar().catch(() => {
  document.getElementById("estado").textContent = "Error cargando la lista.";
});
</script>
</body>
</html>
