<html lang="es">
<head>
<meta charset="UTF-8">

<title>Cuestionario de pareja · Método Gottman</title>

<style>
:root{
  --bg:#F2F5F4; --card:#FFFFFF; --ink:#22302E; --ink-soft:#5C6B68;
  --line:#DDE5E3; --primary:#16544E; --primary-soft:#E3EEEC; --primary-deep:#0E3B37;

}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{

}
.serif{font-family:"Fraunces",Georgia,serif;}
header.top{
  position:sticky; top:0; z-index:20; background:rgba(242,245,244,.92);

  border-bottom:1px solid var(--line);
}
.top-row{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
.top-title{font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); font-weight:600;}
.top-step{font-size:.78rem; color:var(--primary); font-weight:700;}
.bar{height:5px; background:var(--line); border-radius:99px; margin-top:8px; overflow:hidden;}
.bar > div{height:100%; background:linear-gradient(90deg,var(--primary),#2E7A72); border-radius:99px; transition:width .35s ease;}
main{max-width:560px; margin:0 auto; padding:18px 16px 0;}
.eyebrow{font-size:.74rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); font-weight:700; margin:4px 0 2px;}
h1.bignum{font-size:3.2rem; line-height:1; margin:0 0 4px; color:var(--primary-deep); font-weight:650;}
h2.sect{font-size:1.45rem; line-height:1.2; margin:0 0 10px; color:var(--primary-deep); font-weight:650;}
p.hint{color:var(--ink-soft); font-size:.92rem; margin:6px 0 16px;}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:0 1px 2px rgba(20,50,46,.04);}
/* Dual path header choice */
.path{display:block; width:100%; text-align:left; background:var(--card); border:1.5px solid var(--line); border-radius:var(--radius); padding:14px 14px 14px 46px; margin-bottom:10px; font:inherit; color:var(--ink); position:relative; cursor:pointer; transition:border-color .15s, background .15s;}
.path .tick{position:absolute; left:14px; top:15px; width:20px; height:20px; border-radius:50%; border:2px solid #B9C6C3; transition:.15s;}
.path.sel{border-color:var(--primary); background:var(--primary-soft);}
.path.sel .tick{border-color:var(--primary); background:var(--primary); box-shadow:inset 0 0 0 4px var(--primary-soft);}
.path .lbl{display:block; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; font-weight:700; color:var(--ink-soft); margin-bottom:3px;}
.path.sel .lbl{color:var(--primary);}
/* Statement rows */
.stmt{padding:13px 0; border-top:1px solid var(--line);}
.stmt:first-of-type{border-top:none; padding-top:2px;}
.stmt p{margin:0 0 9px; font-size:.97rem;}
.seg{display:flex; gap:8px;}
.seg button, .seg3 button{flex:1; font:inherit; font-size:.86rem; font-weight:600; padding:10px 6px; border-radius:12px; border:1.5px solid var(--line); background:#FBFCFC; color:var(--ink-soft); cursor:pointer; transition:.15s;}
.seg button.sel, .seg3 button.sel{background:var(--primary); border-color:var(--primary); color:#fff;}
.seg3{display:flex; gap:6px;}
.seg3 button{font-size:.76rem; padding:10px 4px; line-height:1.15;}
textarea{width:100%; min-height:88px; font:inherit; font-size:.95rem; padding:12px; border:1.5px solid var(--line); border-radius:12px; background:#FBFCFC; resize:vertical; color:var(--ink);}
textarea:focus, input:focus{outline:2px solid var(--primary); outline-offset:1px; border-color:var(--primary);}
input[type=text]{width:100%; font:inherit; font-size:1rem; padding:12px; border:1.5px solid var(--line); border-radius:12px; background:#FBFCFC; color:var(--ink);}
input.year{width:110px;}
label.fld{display:block; font-size:.8rem; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.08em; margin:0 0 6px;}
/* bottom nav */
nav.bottom{position:fixed; left:0; right:0; bottom:0; z-index:30; background:rgba(255,255,255,.95); backdrop-filter:blur(10px); border-top:1px solid var(--line); padding:12px 16px calc(12px + env(safe-area-inset-bottom)); display:flex; gap:10px; max-width:100%;}
nav.bottom .inner{display:flex; gap:10px; width:100%; max-width:560px; margin:0 auto;}
.btn{font:inherit; font-weight:700; font-size:1rem; border-radius:14px; padding:14px 18px; cursor:pointer; border:1.5px solid var(--line); background:#fff; color:var(--ink); transition:.15s;}
.btn.primary{background:var(--primary); border-color:var(--primary); color:#fff; flex:1;}
.btn.primary:active{background:var(--primary-deep);}
.btn.ghost{flex:0 0 auto;}
.btn:disabled{opacity:.4; cursor:default;}
.btn.export{background:var(--gold); border-color:var(--gold); width:100%; font-size:1.05rem; padding:16px;}
/* commit options */
.opt{display:block; width:100%; text-align:left; background:#fff; border:1.5px solid var(--line); border-radius:14px; padding:13px 13px 13px 44px; margin-bottom:9px; font:inherit; font-size:.92rem; position:relative; cursor:pointer; color:var(--ink);}
.opt .num{position:absolute; left:13px; top:12px; width:22px; height:22px; border-radius:50%; border:2px solid #B9C6C3; font-size:.78rem; font-weight:700; display:flex; align-items:center; justify-content:center; color:var(--ink-soft);}
.opt.sel{border-color:var(--primary); background:var(--primary-soft);}
.opt.sel .num{background:var(--primary); border-color:var(--primary); color:#fff;}
.pill-state{display:inline-block; font-size:.78rem; font-weight:700; padding:4px 10px; border-radius:99px; background:var(--primary-soft); color:var(--primary);}
.missing{color:#A8542F; font-weight:700;}
.review-line{display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-top:1px solid var(--line); font-size:.93rem;}
.review-line:first-child{border-top:none;}
.review-line a{color:var(--primary); font-weight:700; text-decoration:none;}
.intro-quote{font-size:.95rem; color:var(--ink-soft); border-left:3px solid var(--gold); padding:2px 0 2px 12px; margin:14px 0;}
.divider-label{font-size:.74rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); font-weight:700; margin:18px 0 8px;}
@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
button:focus-visible{outline:3px solid var(--gold); outline-offset:2px;}
.saved-note{font-size:.78rem; color:var(--ink-soft); text-align:center; margin:10px 0 0;}
</style>
</head>

/* ---------- páginas ---------- */
const LIFE_CHUNK = 20;
const lifePages = Math.ceil(DATA.life.length / LIFE_CHUNK);

const P_VF = 18, P_COMMIT = 19, P_CHAOS = 20, P_LIFE0 = 21, P_REVIEW = P_LIFE0 + lifePages;
const TOTAL_PAGES = P_REVIEW + 1;
let page = load();

function totalRequired(){ return DATA.areas.length*7 + DATA.vf.length + 1 + DATA.chaos.length + DATA.life.length; }
function answeredCount(){
  let n=0;
  S.areas.forEach(a=>{ if(a.opt!==null)n++; a.stmts.forEach(v=>{ if(v!==null)n++; }); });
  S.vf.forEach(v=>{ if(v.val!==null)n++; });
  if(S.commit!==null)n++;
  S.chaos.forEach(v=>{ if(v!==null)n++; });
  S.life.forEach(v=>{ if(v!==null)n++; });
  return n;
}
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ---------- render ---------- */
const main = document.getElementById('main');
const navInner = document.getElementById('navInner');

function render(){
  window.scrollTo(0,0);
  const pct = Math.round(100*answeredCount()/totalRequired());
  document.getElementById('barFill').style.width = pct+'%';
  document.getElementById('stepLabel').textContent = page===0 ? '' : (page===P_REVIEW ? 'Final · '+pct+'%' : 'Paso '+page+' de '+(TOTAL_PAGES-1)+' · '+pct+'%');

  if(page===0) renderIntro();
  else if(page>=1 && page<=17) renderArea(page-1);
  else if(page===P_VF) renderVF();
  else if(page===P_COMMIT) renderCommit();
  else if(page===P_CHAOS) renderChaos();
  else if(page>=P_LIFE0 && page<P_REVIEW) renderLife(page-P_LIFE0);
  else renderReview();
  renderNav();
  save();
}

function renderNav(){
  let html='';
  if(page>0) html += `<button class="btn ghost" onclick="go(${page-1})">Atrás</button>`;
  if(page===0) html += `<button class="btn primary" onclick="startForm()">${answeredCount()>0?'Continuar donde quedé':'Comenzar'}</button>`;
  else if(page<P_REVIEW) html += `<button class="btn primary" onclick="go(${page+1})">Siguiente</button>`;
  else html += `<button class="btn primary" onclick="exportXLSX()">Descargar Excel</button>`;
  navInner.innerHTML = html;
}
function go(p){ page = Math.max(0, Math.min(TOTAL_PAGES-1, p)); render(); }

function markBox(text, which){
  // reemplaza la casilla □ número `which` (0 o 1) por ☒
  let count = -1;
  return text.replace(/□/g, m => { count++; return count===which ? '☒' : '☐'; });
}
function buildRows(){
  const rows = DATA.template.map(r => r.slice());
  // nombre y fecha
  if(S.name) rows[DATA.nameRow][0] = 'Completado por: ' + S.name + '  —  Fecha: ' + S.date;
  // áreas
  DATA.areas.forEach((A,i)=>{
    const st = S.areas[i];
    if(st.opt!==null) rows[A.headerRow][0] = markBox(rows[A.headerRow][0], st.opt);
    A.stmtRows.forEach((r,k)=>{
      if(st.stmts[k]===0) rows[r][1] = 'X';
      if(st.stmts[k]===1) rows[r][2] = 'X';
    });
    if(st.comment.trim()) rows[A.commentRow][4] = st.comment.trim();
  });
  // verdadero/falso
  DATA.vf.forEach((q,i)=>{
    const v = S.vf[i];
    if(v.val!==null){
      let line = 'VERDADERO ( ' + (v.val? 'X':' ') + ' )    FALSO ( ' + (v.val? ' ':'X') + ' )';
      if(q.hasYear) line += '    Año: ' + (v.year.trim()||'');
      rows[q.markRow][0] = line;
    } else if(q.hasYear && v.year.trim()){
      rows[q.markRow][0] = 'VERDADERO FALSO Año: ' + v.year.trim();
    }
  });
  if(S.vfComment.trim()) rows[DATA.vfCommentRow][0] = S.vfComment.trim();
  // compromiso
  if(S.commit!==null) rows[DATA.commit[S.commit].row][1] = 'X';
  // caos
  DATA.chaos.forEach((q,i)=>{
    if(S.chaos[i]===true) rows[q.markRow][1] = 'X';
    if(S.chaos[i]===false) rows[q.markRow][2] = 'X';
  });
  // historia vital
  DATA.life.forEach((q,i)=>{
    const v = S.life[i];
    if(v!==null) rows[q.markRow][1+v] = 'X';
  });
  return rows;
}
function exportXLSX(){
  if(!S.name){ const el=document.getElementById('nameInput2')||document.getElementById('nameInput'); if(el){ el.focus(); alert('Escribí tu nombre antes de descargar, así la psicóloga sabe de quién es cada cuestionario.'); return; } }
  const miss = totalRequired()-answeredCount();
  if(miss>0 && !confirm('Hay '+miss+' respuestas sin completar. ¿Querés descargar el Excel igual? Las preguntas sin responder quedarán en blanco.')) return;
  const rows = buildRows();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:70},{wch:14},{wch:26},{wch:14},{wch:50}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Cuestionario');
  const safeName = (S.name||'respuestas').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9_-]+/g,'_');
  XLSX.writeFile(wb, 'Cuestionario_Gottman_' + safeName + '.xlsx');
}

render();
</script>
